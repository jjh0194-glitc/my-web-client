<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>내 위치 공유</title>

    <style>
        body { 
            font-family: 'Apple SD Gothic Neo', sans-serif; 
            background-color: #f4f4f4; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
        }
        .app-container { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
        }
        h2 { margin-top: 0; color: #333; }
        
        .file-upload { margin: 15px 0; }
        #preview { 
            width: 100%; 
            border-radius: 12px; 
            display: none; 
            margin-bottom: 15px; 
        }
        
        textarea { 
            width: 90%; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            height: 80px; 
            resize: none; 
            margin-bottom: 20px; 
            font-size: 15px;
        }
        
        .share-btn { 
            background-color: #007BFF; /* 파란색 버튼으로 변경 */
            color: #FFF; 
            border: none; 
            padding: 16px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>📍 현재 위치 공유하기</h2>

        <div class="file-upload">
            <label for="cameraInput" style="cursor:pointer; color:#007BFF; font-weight:bold;">
                📸 여기를 눌러 사진 찍기/고르기
            </label>
            <input type="file" id="cameraInput" accept="image/*" style="display:none;">
        </div>
        
        <img id="preview" alt="미리보기">

        <!-- 코멘트 입력창에 남미 여행 느낌을 살짝 넣어봤어요! -->
        <textarea id="comment" placeholder="Ya regresé! (나 돌아왔어!) 등 코멘트를 남겨보세요."></textarea>

        <!-- 버튼 이름과 색상을 바꿨습니다 -->
        <button class="share-btn" onclick="shareLocation()">🚀 위치 공유하기</button>
    </div>

    <script>
        // 1. 사진 미리보기 기능 (이전과 동일)
        const cameraInput = document.getElementById('cameraInput');
        const preview = document.getElementById('preview');

        cameraInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // 2. 카카오 API 없이 스마트폰 기본 공유 기능(Web Share API) 사용하기!
        async function shareLocation() {
            const comment = document.getElementById('comment').value;

            if (navigator.geolocation) {
                // 위치 찾는 중임을 알림
                const btn = document.querySelector('.share-btn');
                const originalText = btn.innerText;
                btn.innerText = "⏳ 위치 찾는 중...";

                navigator.geolocation.getCurrentPosition(async function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // 구글 지도 링크 생성 (이건 가입 없이 무제한 무료입니다)
                    const mapLink = `https://www.google.com/maps?q=${lat},${lng}`;
                    
                    let shareText = comment ? `${comment}\n\n📍 내 현재 위치야!` : '📍 내 현재 위치야!';

                    // 스마트폰 기본 공유 창 띄우기
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: '내 위치 공유',
                                text: shareText,
                                url: mapLink
                            });
                        } catch (error) {
                            console.log('공유를 취소했거나 에러가 났습니다.', error);
                        }
                    } else {
                        alert('현재 브라우저에서는 공유 기능을 지원하지 않습니다.\n링크를 복사해주세요: ' + mapLink);
                    }

                    // 버튼 글씨 원상복구
                    btn.innerText = originalText;

                }, function(error) {
                    alert('위치 정보를 가져올 수 없습니다. 핸드폰의 GPS(위치)가 켜져 있는지 확인해주세요.');
                    btn.innerText = originalText;
                }, { enableHighAccuracy: true }); // 위치 정확도 높이기 옵션 추가
            } else {
                alert('사용 중인 브라우저에서 위치 기능을 지원하지 않습니다.');
            }
        }
    </script>
</body>
</html>
